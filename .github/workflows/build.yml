name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            type: dmg
            artifact: Cleaner-macos
          # Windows and Linux builds temporarily disabled
          # - os: windows-latest
          #   type: exe
          #   artifact: Cleaner-windows
          # - os: ubuntu-latest
          #   type: deb
          #   artifact: Cleaner-linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Install dependencies on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libxtst-dev fakeroot

      - name: Install WiX v3 on Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # 下载 WiX v3.11.2
          curl -L -o wix311.zip https://github.com/wixtoolset/wix3/releases/download/wix3112rtm/wix311-binaries.zip
          mkdir -p "$HOME/wix"
          unzip -o wix311.zip -d "$HOME/wix"
          # 添加到 PATH
          echo "$HOME/wix" >> $GITHUB_PATH
          # 验证安装
          "$HOME/wix/candle.exe" -?

      - name: Build with Maven
        shell: bash
        run: mvn clean compile

      - name: Create jlink image
        shell: bash
        run: mvn javafx:jlink

      - name: Package application
        shell: bash
        run: mvn jfx:package "-Djfx.type=${{ matrix.type }}"

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/javafx/*.dmg

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/javafx/*.exe

      - name: Upload artifact (Linux)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/javafx/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Cleaner-macos
          path: artifacts/macos

      # Windows and Linux artifacts disabled
      # - name: Download Windows artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: Cleaner-windows
      #     path: artifacts/windows
      # - name: Download Linux artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: Cleaner-linux
      #     path: artifacts/linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/macos/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}